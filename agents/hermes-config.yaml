# Hermes Agent configuration — The Collective
# Deployed to ~/.hermes/config.yaml on collective.csdyn.com by deploy.sh
# SOUL.md is generated from agents/locutus/designation.md + agents/unimatrix.md

model:
  default: "qwen3.5:35b-a3b"
  provider: "custom"
  base_url: "http://ollama.csdyn.com:11434/v1"
  api_key: "ollama"

_config_version: 13

terminal:
  backend: "local"
  cwd: "/opt/collective"
  timeout: 180
  lifetime_seconds: 300

agent:
  max_turns: 60
  verbose: false
  reasoning_effort: "low"

compression:
  enabled: true
  threshold: 0.70
  target_ratio: 0.20
  protect_last_n: 20
  summary_model: "qwen3.5:27b"
  summary_provider: "main"

delegation:
  max_iterations: 40
  default_toolsets: ["terminal", "file", "web"]

skills:
  creation_nudge_interval: 10
  external_dirs:
    - /opt/collective/agents/skills

session_reset:
  mode: idle
  idle_minutes: 1440

streaming:
  enabled: true
  edit_interval: 0.4
  buffer_threshold: 20

platform_toolsets:
  cli: [hermes-cli]
  telegram: [terminal, file, web, skills, todo, cronjob]
  api_server: [terminal, file, web, skills, todo, cronjob]

mcp_servers:
  collective:
    command: node
    args: ["/opt/collective/mcp/server.js"]

auxiliary:
  vision:
    provider: "main"
  web_extract:
    provider: "main"
  compression:
    provider: "main"
  session_search:
    provider: "main"
  skills_hub:
    provider: "main"
  approval:
    provider: "main"
  mcp:
    provider: "main"
  flush_memories:
    provider: "main"

stt:
  enabled: false

display:
  compact: true
