<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <rect width="40" height="40" rx="5" fill="#0d1117"/>
  <!-- Face base -->
  <ellipse cx="20" cy="19" rx="11" ry="12" fill="#1a2535"/>
  <!-- Skin tone overlay -->
  <ellipse cx="20" cy="19" rx="9" ry="10" fill="#2a3545" opacity="0.6"/>
  <!-- Borg implant - left eye -->
  <rect x="10" y="15" width="7" height="3" rx="0.5" fill="#00e5cc" opacity="0.9"/>
  <rect x="10" y="14" width="7" height="1" rx="0.5" fill="#00b8a3"/>
  <!-- Regular right eye -->
  <ellipse cx="25" cy="16.5" rx="3" ry="2" fill="#1c2433"/>
  <ellipse cx="25" cy="16.5" rx="1.5" ry="1.5" fill="#2a3545"/>
  <circle cx="24.5" cy="16" r="0.5" fill="#4a6080" opacity="0.6"/>
  <!-- Implant frame around left eye -->
  <rect x="9" y="13" width="9" height="6" rx="1" fill="none" stroke="#00e5cc" stroke-width="0.6"/>
  <!-- Vertical line through implant -->
  <line x1="13.5" y1="13" x2="13.5" y2="19" stroke="#00b8a3" stroke-width="0.4"/>
  <!-- Nose -->
  <path d="M19 20 L18 23 L22 23" stroke="#4a6080" stroke-width="0.5" fill="none"/>
  <!-- Mouth - stern line -->
  <path d="M15 26 Q20 27 25 26" stroke="#4a6080" stroke-width="0.6" fill="none"/>
  <!-- Chin implant -->
  <rect x="17" y="27" width="6" height="1.5" rx="0.5" fill="#1c2433" stroke="#00e5cc" stroke-width="0.3"/>
  <!-- Left temple cables -->
  <path d="M9 16 C6 14 5 18 7 20" stroke="#00e5cc" stroke-width="0.6" fill="none" opacity="0.7"/>
  <path d="M9 18 C6 17 5 20 7 22" stroke="#1c2433" stroke-width="0.4" fill="none"/>
  <!-- Head top detail -->
  <path d="M13 7 Q20 5 27 7" stroke="#1c2433" stroke-width="0.5" fill="none"/>
  <!-- Small designation text -->
  <text x="20" y="37.5" font-size="3.5" fill="#00e5cc" text-anchor="middle" font-family="monospace" opacity="0.8" letter-spacing="0.5">LOCUTUS</text>
</svg>
