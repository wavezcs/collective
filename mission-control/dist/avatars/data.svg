  <ellipse cx="20" cy="19" rx="10" ry="12" fill="#c8d5e0"/>
  <!-- Head top -->
  <path d="M11 15 Q12 7 20 7 Q28 7 29 15" fill="#b0c0cc" stroke="none"/>
  <!-- Eyes - yellow/amber android eyes -->
  <ellipse cx="15" cy="18" rx="3" ry="2.5" fill="#0d1117"/>
  <ellipse cx="25" cy="18" rx="3" ry="2.5" fill="#0d1117"/>
  <ellipse cx="15" cy="18" rx="2" ry="1.8" fill="#f0c000" opacity="0.9"/>
  <ellipse cx="25" cy="18" rx="2" ry="1.8" fill="#f0c000" opacity="0.9"/>
  <circle cx="15" cy="18" r="1" fill="#a08000"/>
  <circle cx="25" cy="18" r="1" fill="#a08000"/>
  <circle cx="14.6" cy="17.6" r="0.4" fill="#fff" opacity="0.6"/>
  <circle cx="24.6" cy="17.6" r="0.4" fill="#fff" opacity="0.6"/>
  <!-- Brows - precise, flat -->
  <line x1="12.5" y1="15" x2="18" y2="15" stroke="#90a0b0" stroke-width="0.8"/>
  <line x1="22" y1="15" x2="27.5" y2="15" stroke="#90a0b0" stroke-width="0.8"/>
  <!-- Nose -->
  <path d="M19.5 21 L18.5 24 L21.5 24" stroke="#90a0b0" stroke-width="0.5" fill="none"/>
  <!-- Slight smile - neutral android expression -->
  <path d="M16 26.5 Q20 27.5 24 26.5" stroke="#90a0b0" stroke-width="0.7" fill="none"/>
  <!-- Skin tone circuits - subtle -->
  <path d="M11 20 L10 18 L9 20" stroke="#90a0b0" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M10 18 L9 17" stroke="#90a0b0" stroke-width="0.3" fill="none" opacity="0.4"/>
  <!-- Collar/neck -->
  <path d="M15 29 L13 33 L27 33 L25 29" fill="#1c2433" opacity="0.7"/>
  <!-- Designation -->
  <text x="20" y="37.5" font-size="3.5" fill="#00e5cc" text-anchor="middle" font-family="monospace" opacity="0.8" letter-spacing="1.5">DATA</text>
