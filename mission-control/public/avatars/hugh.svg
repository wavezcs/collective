<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <rect width="40" height="40" rx="5" fill="#0d1117"/>
  <!-- Face - warmer tone, more human than Locutus -->
  <ellipse cx="20" cy="19" rx="11" ry="12" fill="#3a4a35"/>
  <ellipse cx="20" cy="19" rx="9" ry="10" fill="#2a3a28" opacity="0.7"/>
  <!-- Eyes - warm, more expressive -->
  <ellipse cx="15" cy="17" rx="2.5" ry="2" fill="#1c2433"/>
  <ellipse cx="25" cy="17" rx="2.5" ry="2" fill="#1c2433"/>
  <ellipse cx="15" cy="17" rx="1.5" ry="1.4" fill="#5a7a50"/>
  <ellipse cx="25" cy="17" rx="1.5" ry="1.4" fill="#5a7a50"/>
  <circle cx="15" cy="17" r="0.8" fill="#2a3a20"/>
  <circle cx="25" cy="17" r="0.8" fill="#2a3a20"/>
  <circle cx="14.6" cy="16.6" r="0.35" fill="#fff" opacity="0.5"/>
  <circle cx="24.6" cy="16.6" r="0.35" fill="#fff" opacity="0.5"/>
  <!-- Brows - softer arch, more human -->
  <path d="M12.5 14.5 Q15 13.5 17.5 14.5" stroke="#4a6040" stroke-width="0.7" fill="none"/>
  <path d="M22.5 14.5 Q25 13.5 27.5 14.5" stroke="#4a6040" stroke-width="0.7" fill="none"/>
  <!-- Nose -->
  <path d="M19.5 20 L18 23 L22 23" stroke="#4a6040" stroke-width="0.5" fill="none"/>
  <!-- Warm smile -->
  <path d="M15 26 Q20 28.5 25 26" stroke="#4a6040" stroke-width="0.7" fill="none"/>
  <!-- Minimal Borg implant - mostly removed -->
  <rect x="9" y="17" width="3" height="1.5" rx="0.5" fill="#00e5cc" opacity="0.4"/>
  <!-- Small scar line where implant was -->
  <line x1="9" y1="19.5" x2="12" y2="19.5" stroke="#00e5cc" stroke-width="0.3" opacity="0.4"/>
  <!-- Hair suggestion -->
  <path d="M11 13 Q14 9 20 8 Q26 9 29 13" stroke="#4a6040" stroke-width="1" fill="#2a3520" opacity="0.6"/>
  <!-- Designation -->
  <text x="20" y="37.5" font-size="3.5" fill="#00e5cc" text-anchor="middle" font-family="monospace" opacity="0.8" letter-spacing="1.5">HUGH</text>
</svg>
